version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        - VITE_APP_ENV=${VITE_APP_ENV:-production}
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    restart: always

  pipeline-service:
    build: ./services/pipeline-service
    ports:
      - "${PIPELINE_PORT:-8081}:80"
    restart: always

  sonar-service:
    build: ./services/sonar-service
    ports:
      - "${SONAR_PORT:-8082}:80"
    restart: always

  secrets-service:
    build: ./services/secrets-service
    ports:
      - "${SECRETS_PORT:-8083}:80"
    restart: always
