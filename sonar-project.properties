# Unique project identifier in SonarQube
sonar.projectKey=VatsalPalm_CICDPipleLine
sonar.projectName=CICDPipleLine
sonar.organization=vatsalpalm
sonar.projectVersion=1.0.0

# Paths to source code
sonar.sources=apps/dashboard/src
sonar.exclusions=apps/dashboard/src/assets/**, node_modules/**, dist/**, **/*.spec.js, **/*.test.js

# Paths to tests
sonar.tests=apps/dashboard/src
sonar.test.inclusions=**/*.spec.jsx, **/*.spec.js, **/*.test.jsx, **/*.test.js

# Path to coverage report (e.g., generated by Jest/Vitest)
sonar.javascript.lcov.reportPaths=apps/dashboard/coverage/lcov.info

# Source code encoding
sonar.sourceEncoding=UTF-8
